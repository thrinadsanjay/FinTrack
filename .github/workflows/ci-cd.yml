name: FinTracker CI/CD

on:
  push:
    branches:
      - Development

concurrency:
  group: fintracker-development
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: fintracker
  HEALTH_URL: http://localhost:8000/health
  HEALTH_EXPECTED: '{"Error":200,"status":"ok"}'
  HEALTH_ATTEMPTS: '3'
  HEALTH_INTERVAL_SECONDS: '300'
  DEPLOY_PATH: ~/fintracker

jobs:
  version_build_push:
    name: Version + Build + Push
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}
      image_repo: ${{ steps.image.outputs.image_repo }}
      ghcr_repository: ${{ steps.image.outputs.ghcr_repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next minor version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          last_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          if [ -z "$last_tag" ]; then
            last_tag="v0.0.0"
          fi
          version_core="${last_tag#v}"
          IFS='.' read -r major minor patch <<EOFV
          ${version_core}
          EOFV
          major="${major:-0}"
          minor="${minor:-0}"
          new_tag="v${major}.$((minor + 1)).0"
          echo "version_tag=${new_tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version_tag }}"
          git push origin "${{ steps.version.outputs.version_tag }}"

      - name: Build image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repo_path="$(printf '%s' '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "ghcr_repository=${repo_path}" >> "$GITHUB_OUTPUT"
          echo "image_repo=ghcr.io/${repo_path}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_repo }}:${{ steps.version.outputs.version_tag }}
            ${{ steps.image.outputs.image_repo }}:dev

  deploy_dev:
    name: Deploy to Dev/Test Server
    runs-on: ubuntu-latest
    needs: version_build_push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key for DEV
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DEV_SSH_KEY }}' > ~/.ssh/dev_key
          chmod 600 ~/.ssh/dev_key
          ssh-keyscan -H '${{ secrets.DEV_SSH_HOST }}' >> ~/.ssh/known_hosts

      - name: Copy deployment files to DEV
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/dev_key '${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}' 'mkdir -p ~/fintracker/scripts'
          scp -i ~/.ssh/dev_key docker-compose.yml '${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml'
          scp -i ~/.ssh/dev_key scripts/deploy.sh '${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}:${{ env.DEPLOY_PATH }}/scripts/deploy.sh'

      - name: Deploy to DEV server
        shell: bash
        run: |
          set -euo pipefail

          echo "DEBUG: IMAGE_REPO=${{ needs.version_build_push.outputs.image_repo }}"

          ssh -i ~/.ssh/dev_key ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} << 'EOF'
            set -euo pipefail

            cd ~/fintracker
            chmod +x scripts/deploy.sh

            export IMAGE_REPO="${{ needs.version_build_push.outputs.image_repo }}"
            export IMAGE_TAG="dev"
            export HEALTH_URL="${{ env.HEALTH_URL }}"
            export HEALTH_EXPECTED='${{ env.HEALTH_EXPECTED }}'
            export HEALTH_ATTEMPTS="1"
            export HEALTH_INTERVAL_SECONDS="0"

            echo "REMOTE DEBUG: IMAGE_REPO=$IMAGE_REPO"

            ./scripts/deploy.sh
          EOF

      - name: Email DEV deployment failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: FinTracker DEV deployment failed
          to: ${{ secrets.ADMIN_EMAIL }}
          from: ${{ secrets.SMTP_USER }}
          body: |
            DEV deployment failed.
            Repository: ${{ github.repository }}
            Branch: Development
            Tag: ${{ needs.version_build_push.outputs.version_tag }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  manual_approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs:
      - version_build_push
      - deploy_dev
    environment:
      name: production
    steps:
      - name: Wait for production approval
        run: echo "Approved for production deployment."

  deploy_production:
    name: Deploy to Production with Rollback
    runs-on: ubuntu-latest
    needs:
      - version_build_push
      - manual_approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key for PROD
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.PROD_SSH_KEY }}' > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H '${{ secrets.PROD_SSH_HOST }}' >> ~/.ssh/known_hosts

      - name: Copy deployment files to PROD
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}' 'mkdir -p ~/fintracker/scripts'
          scp -i ~/.ssh/prod_key docker-compose.yml '${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml'
          scp -i ~/.ssh/prod_key scripts/deploy.sh '${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ env.DEPLOY_PATH }}/scripts/deploy.sh'

      - name: Deploy to PROD server
        id: prod_deploy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          ssh -i ~/.ssh/prod_key '${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}' "cd ${{ env.DEPLOY_PATH }} && chmod +x scripts/deploy.sh && IMAGE_REPO='${{ needs.version_build_push.outputs.image_repo }}' IMAGE_TAG='${{ needs.version_build_push.outputs.version_tag }}' HEALTH_URL='${{ env.HEALTH_URL }}' HEALTH_EXPECTED='${{ env.HEALTH_EXPECTED }}' HEALTH_ATTEMPTS='${{ env.HEALTH_ATTEMPTS }}' HEALTH_INTERVAL_SECONDS='${{ env.HEALTH_INTERVAL_SECONDS }}' ./scripts/deploy.sh"
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Read production deploy status
        id: prod_status
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          status="$(ssh -i ~/.ssh/prod_key '${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}' "cat ${{ env.DEPLOY_PATH }}/.deploy-status" 2>/dev/null || echo total_failure)"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          if [ "$status" = 'success' ]; then
            exit 0
          fi
          exit 1

      - name: Email production success
        if: steps.prod_status.outputs.status == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: FinTracker production deployment succeeded
          to: ${{ secrets.ADMIN_EMAIL }}
          from: ${{ secrets.SMTP_USER }}
          body: |
            Production deployment succeeded.
            Repository: ${{ github.repository }}
            Branch: Development
            Tag: ${{ needs.version_build_push.outputs.version_tag }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Email production rollback
        if: steps.prod_status.outputs.status == 'rollback'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: FinTracker production deployment rolled back
          to: ${{ secrets.ADMIN_EMAIL }}
          from: ${{ secrets.SMTP_USER }}
          body: |
            Production deployment failed health checks and rollback succeeded.
            Repository: ${{ github.repository }}
            Branch: Development
            Tag: ${{ needs.version_build_push.outputs.version_tag }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Email production total failure
        if: steps.prod_status.outputs.status == 'total_failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: FinTracker production deployment total failure
          to: ${{ secrets.ADMIN_EMAIL }}
          from: ${{ secrets.SMTP_USER }}
          body: |
            Production deployment failed and rollback did not recover the service.
            Repository: ${{ github.repository }}
            Branch: Development
            Tag: ${{ needs.version_build_push.outputs.version_tag }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail job when production was not successful
        if: steps.prod_status.outputs.status != 'success'
        shell: bash
        run: exit 1

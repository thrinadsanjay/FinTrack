name: FinTracker CD

on:
  push:
    branches:
      - Dev
  workflow_dispatch:

concurrency:
  group: fintracker-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release bump
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          before_sha="${{ github.event.before }}"
          if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
            messages="$(git log --format=%B "$before_sha..${{ github.sha }}")"
          else
            messages="$(git log -1 --format=%B "${{ github.sha }}")"
          fi

          bump_kind="patch"
          if printf '%s\n' "$messages" | grep -Eqi '(^|[[:space:]])BREAKING:'; then
            bump_kind="major"
          elif printf '%s\n' "$messages" | grep -Eqi '(^|[[:space:]])feat:'; then
            bump_kind="minor"
          elif printf '%s\n' "$messages" | grep -Eqi '(^|[[:space:]])fix:'; then
            bump_kind="patch"
          fi

          commit_subject="$(git log -1 --pretty=%s "${{ github.sha }}")"
          {
            echo "bump_kind=$bump_kind"
            echo "commit_subject<<EOF_SUBJECT"
            printf '%s\n' "$commit_subject"
            echo "EOF_SUBJECT"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_BRANCH: Dev
          DEPLOY_BUMP_KIND: ${{ steps.bump.outputs.bump_kind }}
          DEPLOY_COMMIT_MESSAGE: ${{ steps.bump.outputs.commit_subject }}
          DEPLOY_TRIGGER_ACTOR: ${{ github.actor }}
          COMPOSE_FILE: docker/compose.yml
          ENV_FILE: .env
          HEALTH_URL: http://localhost/health
          HEALTH_ATTEMPTS: '15'
          HEALTH_INTERVAL_SECONDS: '300'
          STARTUP_WAIT_SECONDS: '45'
          DEPLOY_LOG_FILE: deployments.log
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DEPLOY_PATH,DEPLOY_BRANCH,DEPLOY_BUMP_KIND,DEPLOY_COMMIT_MESSAGE,DEPLOY_TRIGGER_ACTOR,COMPOSE_FILE,ENV_FILE,HEALTH_URL,HEALTH_ATTEMPTS,HEALTH_INTERVAL_SECONDS,STARTUP_WAIT_SECONDS,DEPLOY_LOG_FILE
          script_stop: true
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/home/ubuntu/fintracker}"
            chmod +x scripts/deploy.sh scripts/health_check.sh scripts/rollback.sh scripts/version.sh
            ./scripts/deploy.sh

      - name: Deployment summary
        if: success()
        run: |
          {
            echo "## Deployment succeeded"
            echo "- Branch: Dev"
            echo "- Bump: ${{ steps.bump.outputs.bump_kind }}"
            echo "- Commit: ${{ steps.bump.outputs.commit_subject }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Email success notification
        if: success() && secrets.EMAIL_SMTP_HOST != '' && secrets.EMAIL_SMTP_USERNAME != '' && secrets.EMAIL_SMTP_PASSWORD != '' && secrets.EMAIL_FROM != '' && secrets.EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SMTP_HOST }}
          server_port: ${{ secrets.EMAIL_SMTP_PORT != '' && secrets.EMAIL_SMTP_PORT || '587' }}
          username: ${{ secrets.EMAIL_SMTP_USERNAME }}
          password: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          subject: FinTracker deployment succeeded (${{ github.repository }})
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: ${{ secrets.EMAIL_SMTP_SECURE != '' && secrets.EMAIL_SMTP_SECURE || 'false' }}
          body: |
            FinTracker production deployment succeeded.

            Repository: ${{ github.repository }}
            Branch: Dev
            Actor: ${{ github.actor }}
            Commit: ${{ steps.bump.outputs.commit_subject }}
            Bump: ${{ steps.bump.outputs.bump_kind }}
            SHA: ${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Failure summary
        if: failure()
        run: |
          {
            echo "## Deployment failed"
            echo "- Branch: Dev"
            echo "- Bump: ${{ steps.bump.outputs.bump_kind }}"
            echo "- Commit: ${{ steps.bump.outputs.commit_subject }}"
            echo "- Rollback: attempted by scripts/deploy.sh"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Email failure notification
        if: failure() && secrets.EMAIL_SMTP_HOST != '' && secrets.EMAIL_SMTP_USERNAME != '' && secrets.EMAIL_SMTP_PASSWORD != '' && secrets.EMAIL_FROM != '' && secrets.EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SMTP_HOST }}
          server_port: ${{ secrets.EMAIL_SMTP_PORT != '' && secrets.EMAIL_SMTP_PORT || '587' }}
          username: ${{ secrets.EMAIL_SMTP_USERNAME }}
          password: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          subject: FinTracker deployment failed (${{ github.repository }})
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: ${{ secrets.EMAIL_SMTP_SECURE != '' && secrets.EMAIL_SMTP_SECURE || 'false' }}
          body: |
            FinTracker production deployment failed and rollback was attempted.

            Repository: ${{ github.repository }}
            Branch: Dev
            Actor: ${{ github.actor }}
            Commit: ${{ steps.bump.outputs.commit_subject }}
            Bump: ${{ steps.bump.outputs.bump_kind }}
            SHA: ${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

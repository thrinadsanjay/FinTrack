name: FinTracker CI

on:
  push:
    branches:
      - Enhancements
  pull_request:
    branches:
      - Dev

concurrency:
  group: fintracker-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    env:
      FT_MONGO_URI: mongodb://localhost:27017
      FT_MONGO_DB_NAME: fintracker_ci
      FT_ENV: development
      FT_KEYCLOAK_URL: https://sso.example.invalid
      FT_KEYCLOAK_REALM: fintracker
      FT_CLIENT_ID: fintracker-web
      FT_SESSION_SECRET: ci-session-secret
      FT_APP_NAME: FinTracker
      FT_APP_VERSION: 0.0.0-ci
      FT_BASE_URL: http://localhost
      FT_DEFAULT_ADMIN_USERNAME: admin
      FT_DEFAULT_ADMIN_PASSWORD: admin123
      FT_DEFAULT_ADMIN_EMAIL: admin@example.com
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff

      - name: Lint
        run: ruff check app tests scripts .github --select E9,F63,F7,F82

      - name: Compile check
        run: python -m compileall app tests scripts

      - name: Run tests
        run: pytest -q

      - name: Email CI failure notification
        if: failure() && secrets.EMAIL_SMTP_HOST != '' && secrets.EMAIL_SMTP_USERNAME != '' && secrets.EMAIL_SMTP_PASSWORD != '' && secrets.EMAIL_FROM != '' && secrets.EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SMTP_HOST }}
          server_port: ${{ secrets.EMAIL_SMTP_PORT != '' && secrets.EMAIL_SMTP_PORT || '587' }}
          username: ${{ secrets.EMAIL_SMTP_USERNAME }}
          password: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          subject: FinTracker CI failed (${{ github.repository }})
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: ${{ secrets.EMAIL_SMTP_SECURE != '' && secrets.EMAIL_SMTP_SECURE || 'false' }}
          body: |
            FinTracker CI failed.

            Repository: ${{ github.repository }}
            Ref: ${{ github.ref_name }}
            Actor: ${{ github.actor }}
            Event: ${{ github.event_name }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}


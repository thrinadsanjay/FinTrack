{% extends "base.html" %}
{% block title %}New | FinTracker{% endblock %}

{% block content %}
<div class="page-container">
  <div class="card transaction-card">
    <h2 class="card-title">Add Transaction</h2>

    <form method="post" action="/transactions/add" id="transaction-form">
      <div class="form-section">
        <div class="field-group">
          <!-- Amount -->
          <div class="form-field field--idle">
            <input type="number" step="0.01" name="amount" placeholder=" " required />
            <label>Amount</label>
          </div>
          <!-- Account -->
          <div class="form-field field--idle">
            <select name="account_id" id="account" required>
              <option value="" hidden></option>
              {% for acc in accounts %}
              <option value="{{ acc._id }}">
                {{ acc.name }} (₹{{ acc.balance }})
              </option>
              {% endfor %}
            </select>
            <label>Account</label>
          </div>
        </div>
        <div class="field-group">
          <!-- Transaction Type -->
          <div class="form-field field--idle">
            <label>Type</label>
            <select name="tx_type" id="tx_type" required>
              <option value="" hidden></option>
              <option value="debit">Expense</option>
              <option value="credit">Income</option>
              <option value="transfer">Self Transfer</option>
            </select>
          </div>

          <!-- Target Account (Transfer only) -->
          <div class="tohidden" id="target-account-wrapper">
            <div class="form-field field--idle">
              <label>Transfer To</label>
              <select name="target_account_id" id="target_account">
                <option value="" hidden></option>
                {% for acc in accounts %}
                <option value="{{ acc._id }}">{{ acc.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </div>

        <!-- Category and Subcategory -->
        <div class="field-group" id="category-wrapper">
          <!-- Category -->
          <div class="form-field field--idle">
            <select name="category_code" id="category" required>
              <option value="" hidden></option>
            </select>
            <label>Category</label>
          </div>

          <!-- Subcategory -->
          <div class="form-field field--idle">
            <select name="subcategory_code" id="subcategory" required>
              <option value="" hidden></option>
            </select>
            <label>Subcategory</label>
          </div>
        </div>

      <!-- Description -->
      <div class="form-field field--idle">
        <input type="text" name="description">
        <label>Description</label>
      </div>
  </div>
  <!-- Recurring Checkbox -->
  <div class="form-check mt-2">
    <input class="form-check-input" type="checkbox" id="isRecurring" name="is_recurring" value="1">
    <label class="form-check-label" for="isRecurring">
      Recurring Transaction
    </label>
  </div>
  <div class="form-section">
    <!-- Recurring Section -->
    <div id="recurringSection" class="mt-3" style="display: none;">
      <div class="form-field field--idle">
        <label>Frequency</label>
        <select name="frequency" id="recurringFrequency">
          <option value="" hidden></option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="biweekly">Bi-Weekly</option>
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="halfyearly">Half Yearly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>

      <div class="field-group">
        <div class="form-field field--active">
          <label class="mt-2">Start Date</label>
          <input type="date" name="start_date" id="recurringStartDate">
        </div>

        <div class="form-field field--idle">
          <label class="mt-2">End Date</label>
          <input type="text" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'" name="end_date"
            id="recurringEndDate" placeholder="testttt">
        </div>
        <input type="hidden" name="interval" value="1">
      </div>
    </div>
  </div>
  <button type="submit" class="mt-3">Add Transaction</button>
  </form>
</div>
</div>


<script src="/static/js/transactions.js" defer></script>
{% endblock %}

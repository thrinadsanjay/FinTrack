{% extends "base.html" %}
{% block title %}New | FinTracker{% endblock %}

{% block content %}
<div class="page-container">
  <div class="card transaction-card table-scroll">
    <h2 class="card-title">Add Transaction</h2>
    <form method="post" action="/transactions/add" id="transaction-form">

      <!-- ================= TRANSACTION DETAILS ================= -->
      <div class="form-section">

        <!-- Row 1 -->
        <div class="field-group">
          <div class="form-field field--idle">
            <label>Amount</label>
            <input type="number" step="0.01" name="amount" required />
          </div>

          <div class="form-field field--idle">
            <label>Account</label>
            <select name="account_id" id="account" required>
              <option value="" hidden></option>
              {% for acc in accounts %}
              <option value="{{ acc._id }}">
                {{ acc.name }} (₹{{ acc.balance }})
              </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- Row 2 -->
        <div class="field-group">
          <div class="form-field field--idle">
            <label>Type</label>
            <select name="tx_type" id="tx_type" required>
              <option value="" hidden></option>
              <option value="debit">Expense</option>
              <option value="credit">Income</option>
              <option value="transfer">Self Transfer</option>
            </select>
          </div>

          <div class="form-field field--idle">
            <label>Mode</label>
            <select name="mode" required>
              <option value="" hidden></option>
              <option value="upi">UPI</option>
              <option value="card">Card</option>
              <option value="online">Online</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <!-- Row 3 (Transfer only) -->
        <div class="field-group tohidden" id="target-account-wrapper">
          <div class="form-field field--idle col-span-2">
            <label>Transfer To</label>
            <select name="target_account_id" id="target_account">
              <option value="" hidden></option>
              {% for acc in accounts %}
              <option value="{{ acc._id }}">{{ acc.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- Row 4 -->
        <div class="field-group" id="category-wrapper">
          <div class="form-field field--idle">
            <label>Category</label>
            <select name="category_code" id="category" required>
              <option value="" hidden></option>
            </select>
          </div>

          <div class="form-field field--idle">
            <label>Subcategory</label>
            <select name="subcategory_code" id="subcategory" required>
              <option value="" hidden></option>
            </select>
          </div>
        </div>

        <!-- Row 5 -->
        <div class="field-group">
          <div class="form-field field--idle col-span-2">
            <label>Description</label>
            <input type="text" name="description" />
          </div>
        </div>

      </div>

      <!-- ================= RECURRING ================= -->
      <div class="form-check mt-2 recurring-toggle">
        <input type="checkbox" id="isRecurring" name="is_recurring" value="1">
        <label for="isRecurring">
          <span class="toggle-ui"></span>
          <span class="toggle-label">Recurring Transaction</span>
        </label>
      </div>

      <div class="form-section mt-3" id="recurringSection" style="display: none;">
        
        <!-- Row  -->
        <div class="field-group">
          <div class="form-field field--idle" id="recurringStartDate">
            <label class="mt-2">Start Date</label>
            <input type="date" name="start_date" id="recurringStartDate">
          </div>
          <div class="form-field field--idle" id="recurringEndDate">
            <label class="mt-2">End Date</label>
            <input type="text" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'" name="end_date" id="recurringEndDate">
          </div>
        </div>
        
      
        <!-- Row 2 -->
        <div class="field-group">
          <div class="form-field field--idle" id="recurringFrequency">
            <label>Frequency</label>
            <select name="frequency">
              <option value="" hidden></option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="biweekly">Bi-Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="quarterly">Quarterly</option>
              <option value="halfyearly">Half Yearly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
        </div>
        <input type="hidden" name="interval" value="1">
      </div>

      <button type="submit" class="mt-3 add-tx-btn">Add Transaction</button>
    </form>
  </div>
</div>

<script src="/static/js/transactions.js" defer></script>
{% endblock %}

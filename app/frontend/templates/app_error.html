{% extends "base.html" %}
{% block title %}{{ FT_APP_NAME }} ¦ Error{% endblock %}

{% block content %}
<section class="page page-auth">
  <div class="login-bg">
    <div class="login-card animate-in">
      <h2 class="login-title">Something went wrong</h2>
      <p class="login-subtitle">
        The app hit an unexpected error while loading this page.
      </p>
      {% if FT_ENV.lower() in ['dev', 'development'] and error %}
        <p class="login-error">{{ error }}</p>
      {% endif %}
      <div class="login-options" style="justify-content:center; gap:12px;">
        <a href="/" class="btn-secondary">Go Home</a>
        <a href="javascript:window.location.reload()" class="btn-primary">Retry</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}

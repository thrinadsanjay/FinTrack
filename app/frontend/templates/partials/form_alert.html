{% if alert_error %}
  <div class="form-alert form-alert-error" role="alert">
    <span class="form-alert-icon" aria-hidden="true">!</span>
    <span class="form-alert-text">{{ alert_error }}</span>
  </div>
{% endif %}
{% if alert_success %}
  <div class="form-alert form-alert-success" role="status" aria-live="polite">
    <span class="form-alert-icon" aria-hidden="true">✓</span>
    <span class="form-alert-text">{{ alert_success }}</span>
  </div>
{% endif %}
{% if alert_info %}
  <div class="form-alert form-alert-info" role="status" aria-live="polite">
    <span class="form-alert-icon" aria-hidden="true">i</span>
    <span class="form-alert-text">{{ alert_info }}</span>
  </div>
{% endif %}

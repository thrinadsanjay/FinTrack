name: fin_tracker

volumes:
  mongodb_data:

networks:
  ft-net:
    driver: bridge

x-common: &common
  env_file:
    - ../.env
  networks:
    - ft-net

services:
  mongodb:
    <<: *common
    image: mongo:7
    hostname: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' mongodb:27017/admin | grep 1 >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mongo-express:
    <<: *common
    image: mongo-express:latest
    hostname: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    <<: *common
    image: backend:${FT_APP_VERSION}
    build:
      context: ../
      dockerfile: Dockerfile
    hostname: ft_app
    restart: unless-stopped
    ports:
      - "8008:8000"
    volumes:
      - ../logs:/fintracker/logs:z
      - ../backups:/fintracker/backups:z
    #environment:
    #  - FT_LOG_DIR=/fintracker/logs
    depends_on:
      mongodb:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        if [ "${FT_UVICORN_RELOAD:-false}" = "true" ]; then
          exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        fi
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import sys, urllib.request;
          response = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5);
          sys.exit(0 if response.status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

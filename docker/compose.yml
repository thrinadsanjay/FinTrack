name: fin_tracker

volumes:
  mongodb_data:
  app_logs:
  app_backups:

networks:
  ft-net:
    driver: bridge

x-common: &common
  env_file:
    - ../.env
  networks:
    - ft-net

services:
  mongodb:
    <<: *common
    image: mongo:7.0
    hostname: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' mongodb:27017/admin | grep 1 >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mongo-express:
    <<: *common
    image: mongo-express:1.0.2
    hostname: mongo-express
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    <<: *common
    image: fin_tracker_backend:${FT_APP_VERSION:-1.0.0}
    build:
      context: ../
      dockerfile: Dockerfile
    hostname: ft_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - app_logs:/fintracker/logs
      - ./backups:/fintracker/backups
    environment:
      FT_LOG_DIR: /fintracker/logs
      FT_BACKUP_DESTINATION: ${FT_BACKUP_DESTINATION:-/fintracker/backups}
    depends_on:
      mongodb:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        if [ "${FT_UVICORN_RELOAD:-false}" = "true" ]; then
          exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        fi
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import sys, urllib.request;
          response = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5);
          sys.exit(0 if response.status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

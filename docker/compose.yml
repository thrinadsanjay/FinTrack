version: "3.9"

services:

  db:
    image: postgres:16
    container_name: ft_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sanjay
      POSTGRES_PASSWORD: sanjay123
      POSTGRES_DB: fintracker
    ports:
      - "5432:5432"
    volumes:
      - ../db/data:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d
    networks:
      - ft-net

  pgweb:
    image: sosedoff/pgweb
    container_name: ft_pgweb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://sanjay:sanjay123@db:5432/fintracker?sslmode=disable
    depends_on:
      - db
    networks:
      - ft-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ft_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      DATABASE_URL: postgres://sanjay:sanjay123@db:5432/fintracker
      ENV: development
    depends_on:
      - db
    networks:
      - ft-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  ft-net:
